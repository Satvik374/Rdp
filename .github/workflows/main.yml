name: Ubuntu RDP Tunnel

on:
  workflow_dispatch:

jobs:
  rdp-access:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install XRDP and XFCE Desktop
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xfce4 xfce4-goodies dbus-x11 wget unzip
          echo xfce4-session > ~/.xsession
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          sudo ufw allow 3389/tcp || true
          sudo sed -i 's/^port=3389/port=3389/' /etc/xrdp/xrdp.ini
          sudo systemctl restart xrdp
          sudo netstat -tlnp | grep 3389 || echo "XRDP started"

      - name: Create RDP User
        run: |
          password=$(cat /dev/urandom | tr -dc 'A-Za-z0-9@#!' | head -c 16)
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:$password" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          echo "xfce4-session" | sudo tee /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          sudo chmod 755 /home/rdpuser/.xsession
          echo "RDP_PASSWORD=$password" >> $GITHUB_ENV
          echo "✓ RDP user created: rdpuser / $password"

      - name: Start LocaltoNet SSH Tunnel
        run: |
          echo "Starting tunnel with LocaltoNet SSH command..."
          nohup ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=999 \
            -p 223 \
            "${{ secrets.LOCALTONET_TOKEN }}@${{ secrets.LOCALTONET_SERVER }}" \
            -R "${{ secrets.LOCALTONET_REMOTE_PORT }}:127.0.0.1:3389" \
            -N > tunnel.log 2>&1 &
          
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV
          
          # Wait and verify
          sleep 10
          if kill -0 $TUNNEL_PID 2>/dev/null; then
            echo "✓ Tunnel running (PID: $TUNNEL_PID)"
            ps aux | grep ssh || true
          else
            echo "Tunnel log:"
            cat tunnel.log
            exit 1
          fi

      - name: Show Connection Details & Keep Alive
        run: |
          echo ""
          echo "🎯 RDP ACCESS DETAILS 🎯"
          echo "════════════════════════"
          echo "Server:  ${{ secrets.LOCALTONET_SERVER }}"
          echo "Port:    ${{ secrets.LOCALTONET_REMOTE_PORT }}"
          echo "User:    rdpuser"
          echo "Pass:    $RDP_PASSWORD"
          echo ""
          echo "📱 Connect via:"
          echo "mstsc /v:${{ secrets.LOCALTONET_SERVER }}:${{ secrets.LOCALTONET_REMOTE_PORT }}"
          echo "════════════════════════"
          echo ""
          
          # Keep workflow alive
          while true; do
            echo "[$(date)] ✅ RDP Active (PID: $TUNNEL_PID)"
            sleep 300
          done
