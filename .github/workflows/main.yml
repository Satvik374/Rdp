name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install RDP Server and Desktop
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xfce4 xfce4-goodies dbus-x11
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          echo xfce4-session | tee ~/.xsession
          sudo sed -i 's/^port=3389/port=3389/' /etc/xrdp/xrdp.ini
          sudo systemctl restart xrdp
          echo "xrdp installed and running"

      - name: Create RDP User
        run: |
          password=$(cat /dev/urandom | tr -dc 'A-Za-z0-9@#!' | head -c 16)
          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:$password" | sudo chpasswd
          sudo usermod -aG sudo rdpuser
          echo "xfce4-session" | sudo tee /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession
          echo "RDP_PASSWORD=$password" >> $GITHUB_ENV
          echo "RDP user created successfully"

      - name: Download and Install LocaltoNet
        run: |
          echo "Downloading LocaltoNet for Linux..."
          curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o localtonet.zip
          unzip localtonet.zip
          chmod +x localtonet
          sudo mv localtonet /usr/local/bin/localtonet
          localtonet --version
          echo "LocaltoNet installed successfully"

      - name: Start LocaltoNet Tunnel
        run: |
          # Authenticate and start tunnel using SSH command format
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=999 \
              -p 223 \
              ${{ secrets.LOCALTONET_TOKEN }}@${{ secrets.LOCALTONET_SERVER }} \
              -R ${{ secrets.LOCALTONET_REMOTE_PORT }}:127.0.0.1:3389 \
              -N &

          TUNNEL_PID=$!
          echo "Tunnel PID: $TUNNEL_PID"

          # Wait and verify tunnel is running
          sleep 15

          if kill -0 $TUNNEL_PID 2>/dev/null; then
              echo "Tunnel is running successfully!"
          else
              echo "Tunnel failed to start"
              exit 1
          fi

      - name: Maintain Connection
        run: |
          echo ""
          echo "=== RDP ACCESS DETAILS ==="
          echo "Address:  ${{ secrets.LOCALTONET_SERVER }}"
          echo "Port:     ${{ secrets.LOCALTONET_REMOTE_PORT }}"
          echo "Username: rdpuser"
          echo "Password: $RDP_PASSWORD"
          echo "Connect:  ${{ secrets.LOCALTONET_SERVER }}:${{ secrets.LOCALTONET_REMOTE_PORT }}"
          echo "=========================="

          while true; do
              echo "[$(date)] RDP Active - Cancel workflow to terminate"
              sleep 300
          done
