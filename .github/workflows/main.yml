name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Cloudflare"
          netsh advfirewall firewall add rule name="RDP-Cloudflare" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Cloudflare Tunnel
        run: |
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "C:\cloudflared.exe"
          Write-Host "Cloudflared downloaded successfully"
          & "C:\cloudflared.exe" --version

      - name: Establish Cloudflare Tunnel
        run: |
          $process = Start-Process -FilePath "C:\cloudflared.exe" `
            -ArgumentList "tunnel --url http://localhost:3389 --no-autoupdate" `
            -WindowStyle Hidden `
            -RedirectStandardOutput "C:\cf-log.txt" `
            -RedirectStandardError "C:\cf-err.txt" `
            -PassThru

          Write-Host "Cloudflared PID: $($process.Id)"

          $tunnel = $null
          $retries = 0
          $maxRetries = 30

          while (-not $tunnel -and $retries -lt $maxRetries) {
              Start-Sleep -Seconds 5
              $retries++
              Write-Host "Attempt $retries/$maxRetries - Waiting for tunnel..."

              if ($process.HasExited) {
                  Write-Host "--- CF STDOUT ---"
                  if (Test-Path "C:\cf-log.txt") { Get-Content "C:\cf-log.txt" }
                  Write-Host "--- CF STDERR ---"
                  if (Test-Path "C:\cf-err.txt") { Get-Content "C:\cf-err.txt" }
                  Write-Error "Cloudflared exited unexpectedly"
                  exit 1
              }

              if (Test-Path "C:\cf-err.txt") {
                  $logContent = Get-Content "C:\cf-err.txt" -Raw
                  if ($retries % 5 -eq 0) {
                      Write-Host "--- CF Log Snapshot ---"
                      Write-Host $logContent
                  }
                  if ($logContent -match "(https://[a-z0-9\-]+\.trycloudflare\.com)") {
                      $tunnel = $matches[1]
                      Write-Host "Tunnel found: $tunnel"
                  }
              }
          }

          if (-not $tunnel) {
              Write-Host "--- Final CF STDOUT ---"
              if (Test-Path "C:\cf-log.txt") { Get-Content "C:\cf-log.txt" }
              Write-Host "--- Final CF STDERR ---"
              if (Test-Path "C:\cf-err.txt") { Get-Content "C:\cf-err.txt" }
              Write-Error "Cloudflare tunnel not established after $maxRetries attempts."
              exit 1
          }

          echo "CF_TUNNEL=$tunnel" >> $env:GITHUB_ENV

      - name: Install Cloudflare WARP / cloudflared on Runner for RDP Client
        run: |
          Write-Host "Tunnel is ready for external RDP access"
          Write-Host "You will need cloudflared on YOUR machine to connect"

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS DETAILS ==="
          Write-Host "Tunnel URL: $env:CF_TUNNEL"
          Write-Host "Username:   RDP"
          Write-Host "Password:   $env:RDP_PASSWORD"
          Write-Host "=========================="
          Write-Host ""
          Write-Host "To connect, run this on YOUR machine first:"
          Write-Host "cloudflared access tcp --hostname $env:CF_TUNNEL --url localhost:13389"
          Write-Host ""
          Write-Host "Then open RDP client and connect to:"
          Write-Host "localhost:13389"
          Write-Host "=========================="

          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Cancel workflow to terminate"
              Start-Sleep -Seconds 300
          }
