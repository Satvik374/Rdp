name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Ngrok"
          netsh advfirewall firewall add rule name="RDP-Ngrok" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Ngrok
        run: |
          $ngrokUrl = "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip"
          $zipPath = "$env:TEMP\ngrok.zip"
          $extractPath = "$env:TEMP\ngrok"

          Invoke-WebRequest -Uri $ngrokUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          Move-Item "$extractPath\ngrok.exe" "C:\ngrok.exe" -Force
          Remove-Item $zipPath -Force

      - name: Establish Ngrok Tunnel
        run: |
          # Authenticate ngrok with auth token
          & "C:\ngrok.exe" config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

          # Start ngrok tunnel for RDP in the background
          $ngrokProcess = Start-Process -FilePath "C:\ngrok.exe" `
            -ArgumentList "tcp 3389 --log=stdout --log-level=debug" `
            -WindowStyle Hidden `
            -RedirectStandardOutput "C:\ngrok-log.txt" `
            -RedirectStandardError "C:\ngrok-err.txt" `
            -PassThru

          Write-Host "Ngrok PID: $($ngrokProcess.Id)"

          # Wait for ngrok API to become available (retry loop)
          $tunnel = $null
          $retries = 0
          $maxRetries = 40

          while (-not $tunnel -and $retries -lt $maxRetries) {
              Start-Sleep -Seconds 5
              $retries++
              Write-Host "Attempt $retries/$maxRetries - Checking ngrok API..."

              # Print logs every 5 attempts to help debug
              if ($retries % 5 -eq 0) {
                  Write-Host "--- ngrok stdout ---"
                  if (Test-Path "C:\ngrok-log.txt") { Get-Content "C:\ngrok-log.txt" | Select-Object -Last 20 }
                  Write-Host "--- ngrok stderr ---"
                  if (Test-Path "C:\ngrok-err.txt") { Get-Content "C:\ngrok-err.txt" | Select-Object -Last 20 }
              }

              # Check if process is still running
              if ($ngrokProcess.HasExited) {
                  Write-Error "Ngrok process exited unexpectedly with code $($ngrokProcess.ExitCode)"
                  Write-Host "--- Final ngrok stdout ---"
                  if (Test-Path "C:\ngrok-log.txt") { Get-Content "C:\ngrok-log.txt" }
                  Write-Host "--- Final ngrok stderr ---"
                  if (Test-Path "C:\ngrok-err.txt") { Get-Content "C:\ngrok-err.txt" }
                  exit 1
              }

              try {
                  $tunnelInfo = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
                  if ($tunnelInfo.tunnels.Count -gt 0) {
                      $tunnel = $tunnelInfo.tunnels[0].public_url
                      Write-Host "Tunnel found: $tunnel"
                  } else {
                      Write-Host "API reachable but no tunnels yet..."
                  }
              } catch {
                  Write-Host "API not ready: $($_.Exception.Message)"
              }
          }

          if (-not $tunnel) {
              Write-Host "--- Final ngrok stdout ---"
              if (Test-Path "C:\ngrok-log.txt") { Get-Content "C:\ngrok-log.txt" }
              Write-Host "--- Final ngrok stderr ---"
              if (Test-Path "C:\ngrok-err.txt") { Get-Content "C:\ngrok-err.txt" }
              Write-Error "Ngrok tunnel not established after $maxRetries attempts."
              exit 1
          }

          # Parse host and port from tcp://X.X.X.X:PORT
          $parsed = $tunnel -replace "tcp://", ""
          $ngrokHost = $parsed.Split(":")[0]
          $ngrokPort = $parsed.Split(":")[1]

          Write-Host "Tunnel established: $tunnel"
          echo "NGROK_HOST=$ngrokHost" >> $env:GITHUB_ENV
          echo "NGROK_PORT=$ngrokPort" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Ngrok Host: $env:NGROK_HOST"
          Write-Host "Ngrok Port: $env:NGROK_PORT"

          $testResult = Test-NetConnection -ComputerName $env:NGROK_HOST -Port $env:NGROK_PORT
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port failed via ngrok"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address:  $env:NGROK_HOST"
          Write-Host "Port:     $env:NGROK_PORT"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "Connect:  $env:NGROK_HOST`:$env:NGROK_PORT"
          Write-Host "==================`n"

          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Cancel workflow to terminate"
              Start-Sleep -Seconds 300
          }
