name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tunnel"
          netsh advfirewall firewall add rule name="RDP-Tunnel" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force
          Write-Host "RDP configured successfully"

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }
          Write-Host "RDP user created successfully"

      - name: Enable OpenSSH Client
        run: |
          $capability = Get-WindowsCapability -Online | Where-Object Name -like 'OpenSSH.Client*'
          if ($capability.State -ne 'Installed') {
              Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
          }
          Write-Host "OpenSSH client ready"

      - name: Start localhost.run Tunnel
        run: |
          # Generate SSH key
          $sshDir = "$env:USERPROFILE\.ssh"
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          ssh-keygen -t ed25519 -f "$sshDir\id_ed25519" -N '""' -q 2>$null

          # Start tunnel
          $process = Start-Process -FilePath "ssh" `
            -ArgumentList "-v -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -R 3389:localhost:3389 localhost.run" `
            -WindowStyle Hidden `
            -RedirectStandardOutput "C:\tunnel-log.txt" `
            -RedirectStandardError "C:\tunnel-err.txt" `
            -PassThru

          Write-Host "SSH Tunnel PID: $($process.Id)"

          $tunnel = $null
          $retries = 0
          $maxRetries = 30

          while (-not $tunnel -and $retries -lt $maxRetries) {
              Start-Sleep -Seconds 5
              $retries++
              Write-Host "Attempt $retries/$maxRetries - Waiting for tunnel..."

              if ($process.HasExited) {
                  Write-Host "--- STDOUT ---"
                  if (Test-Path "C:\tunnel-log.txt") { Get-Content "C:\tunnel-log.txt" }
                  Write-Host "--- STDERR ---"
                  if (Test-Path "C:\tunnel-err.txt") { Get-Content "C:\tunnel-err.txt" }
                  Write-Error "SSH tunnel exited unexpectedly"
                  exit 1
              }

              $logFiles = @("C:\tunnel-log.txt", "C:\tunnel-err.txt")
              foreach ($logFile in $logFiles) {
                  if (Test-Path $logFile) {
                      $logContent = Get-Content $logFile -Raw
                      Write-Host "--- Log $logFile ---"
                      Write-Host $logContent

                      # localhost.run prints address like: xxxxx.lhr.life:PORT
                      if ($logContent -match "([a-z0-9\-]+\.lhr\.life):(\d+)") {
                          $tunnel = "$($matches[1]):$($matches[2])"
                          Write-Host "Tunnel found: $tunnel"
                          break
                      }
                      # Also try alternate format
                      if ($logContent -match "tunneled.*?([\w\-]+\.localhost\.run):(\d+)") {
                          $tunnel = "$($matches[1]):$($matches[2])"
                          Write-Host "Tunnel found: $tunnel"
                          break
                      }
                  }
              }
          }

          if (-not $tunnel) {
              Write-Host "--- Final STDOUT ---"
              if (Test-Path "C:\tunnel-log.txt") { Get-Content "C:\tunnel-log.txt" }
              Write-Host "--- Final STDERR ---"
              if (Test-Path "C:\tunnel-err.txt") { Get-Content "C:\tunnel-err.txt" }
              Write-Error "Tunnel not established after $maxRetries attempts."
              exit 1
          }

          $tunnelHost = $tunnel.Split(":")[0]
          $tunnelPort = $tunnel.Split(":")[1]

          echo "TUNNEL_HOST=$tunnelHost" >> $env:GITHUB_ENV
          echo "TUNNEL_PORT=$tunnelPort" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS DETAILS ==="
          Write-Host "Address:  $env:TUNNEL_HOST"
          Write-Host "Port:     $env:TUNNEL_PORT"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "Connect:  $env:TUNNEL_HOST`:$env:TUNNEL_PORT"
          Write-Host "=========================="

          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Cancel workflow to terminate"
              Start-Sleep -Seconds 300
          }
