name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Bore"
          netsh advfirewall firewall add rule name="RDP-Bore" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force
          Write-Host "RDP configured successfully"

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }
          Write-Host "RDP user created successfully"

      - name: Install bore
        run: |
          Write-Host "Downloading bore..."
          Invoke-WebRequest `
            -Uri "https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.0-x86_64-pc-windows-msvc.zip" `
            -OutFile "C:\bore.zip"
          Expand-Archive -Path "C:\bore.zip" -DestinationPath "C:\bore-extracted" -Force
          Move-Item "C:\bore-extracted\bore.exe" "C:\bore.exe" -Force
          Remove-Item "C:\bore.zip" -Force
          Write-Host "bore installed successfully"
          & "C:\bore.exe" --version

      - name: Start bore Tunnel
        run: |
          $process = Start-Process -FilePath "C:\bore.exe" `
            -ArgumentList "local 3389 --to bore.pub" `
            -WindowStyle Hidden `
            -RedirectStandardOutput "C:\bore-log.txt" `
            -RedirectStandardError "C:\bore-err.txt" `
            -PassThru

          Write-Host "bore PID: $($process.Id)"

          $tunnel = $null
          $retries = 0
          $maxRetries = 20

          while (-not $tunnel -and $retries -lt $maxRetries) {
              Start-Sleep -Seconds 3
              $retries++
              Write-Host "Attempt $retries/$maxRetries - Waiting for tunnel..."

              if ($process.HasExited) {
                  Write-Host "--- bore STDOUT ---"
                  if (Test-Path "C:\bore-log.txt") { Get-Content "C:\bore-log.txt" }
                  Write-Host "--- bore STDERR ---"
                  if (Test-Path "C:\bore-err.txt") { Get-Content "C:\bore-err.txt" }
                  Write-Error "bore exited unexpectedly with code $($process.ExitCode)"
                  exit 1
              }

              $logFiles = @("C:\bore-log.txt", "C:\bore-err.txt")
              foreach ($logFile in $logFiles) {
                  if (Test-Path $logFile) {
                      $logContent = Get-Content $logFile -Raw
                      Write-Host "--- Log ---"
                      Write-Host $logContent

                      # bore prints: "listening at bore.pub:PORT"
                      if ($logContent -match "listening at bore\.pub:(\d+)") {
                          $port = $matches[1]
                          $tunnel = "bore.pub:$port"
                          Write-Host "Tunnel found: $tunnel"
                          break
                      }
                  }
              }
          }

          if (-not $tunnel) {
              Write-Host "--- Final bore STDOUT ---"
              if (Test-Path "C:\bore-log.txt") { Get-Content "C:\bore-log.txt" }
              Write-Host "--- Final bore STDERR ---"
              if (Test-Path "C:\bore-err.txt") { Get-Content "C:\bore-err.txt" }
              Write-Error "bore tunnel not established after $maxRetries attempts."
              exit 1
          }

          $boreHost = $tunnel.Split(":")[0]
          $borePort = $tunnel.Split(":")[1]

          echo "BORE_HOST=$boreHost" >> $env:GITHUB_ENV
          echo "BORE_PORT=$borePort" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS DETAILS ==="
          Write-Host "Address:  $env:BORE_HOST"
          Write-Host "Port:     $env:BORE_PORT"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "Connect:  bore.pub:$env:BORE_PORT"
          Write-Host "=========================="

          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Cancel workflow to terminate"
              Start-Sleep -Seconds 300
          }
